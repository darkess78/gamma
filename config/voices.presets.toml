[profiles.gpt_sovits_clear]
label = "GPT-SoVITS Clear"
provider = "local"
description = "Conservative GPT-SoVITS preset intended to reduce smear and prompt leakage."
gpt_sovits_reference_audio = "./data/GPT-SoVITS/reference/evil_neuro_34_42_mono32k.wav"
gpt_sovits_prompt_text = "Thanks so much for subscribing! I feel so warm and fuzzy inside. And no it's not because of my cat ears."
gpt_sovits_prompt_lang = "en"
gpt_sovits_text_lang = "en"
gpt_sovits_extra_json = { top_k = 5, top_p = 0.85, temperature = 0.7, text_split_method = "cut5", batch_size = 1, batch_threshold = 0.75, split_bucket = true, speed_factor = 1.0, fragment_interval = 0.3, seed = 42 }

