[profiles.henya_rvc]
label = "Henya RVC"
provider = "piper"
description = "Piper speech converted through the Henya RVC model."
piper_model_path = "./data/piper/en_US-lessac-medium.onnx"
piper_config_path = "./data/piper/en_US-lessac-medium.onnx.json"
rvc_enabled = true
rvc_model_name = "HenyaTheGeniusV2.pth"
rvc_pitch = 12
rvc_formant = 0.15
rvc_f0_method = "rmvpe"
rvc_index_rate = 0.15
rvc_filter_radius = 3
rvc_rms_mix_rate = 0.2
rvc_protect = 0.33
rvc_resample_sr = 0

[profiles.qwen_shana_clean]
label = "Qwen3-TTS Shana Clean"
provider = "qwen-tts"
description = "Qwen3-TTS voice clone using a clean labeled Shana reference clip."
qwen_tts_endpoint = "http://127.0.0.1:9882/tts"
qwen_tts_reference_audio = "./assets/voice_references/shana/shana_qwen_ref_clean.wav"
qwen_tts_reference_text = "その穴埋め問題、全然意味のない場所が空いてるわ。"
qwen_tts_language = "English"
qwen_tts_timeout_seconds = 120
qwen_tts_extra_json = { temperature = 0.9, top_k = 50, top_p = 1.0, repetition_penalty = 1.05, max_new_tokens = 2048, min_new_tokens = 100 }

[profiles.qwen_shana_soft]
label = "Qwen3-TTS Shana Soft"
provider = "qwen-tts"
description = "Softer Shana clone preset for English speech; lower variance and slightly slower pacing to reduce sharp accented edges."
qwen_tts_endpoint = "http://127.0.0.1:9882/tts"
qwen_tts_reference_audio = "./assets/voice_references/shana/shana_qwen_ref_clean.wav"
qwen_tts_reference_text = "その穴埋め問題、全然意味のない場所が空いてるわ。"
qwen_tts_language = "English"
qwen_tts_timeout_seconds = 120
qwen_tts_extra_json = { temperature = 0.58, top_k = 20, top_p = 0.82, repetition_penalty = 1.03, speed = 0.94, max_new_tokens = 2048, min_new_tokens = 100 }

[profiles.qwen_shana_montage_soft]
label = "Qwen3-TTS Shana Montage Soft"
provider = "qwen-tts"
description = "Longer Shana reference montage for stronger character identity in English, with conservative generation settings and a mild softening hint."
qwen_tts_endpoint = "http://127.0.0.1:9882/tts"
qwen_tts_reference_audio = "./assets/voice_references/shana/shana_clean_reference_montage_20s.wav"
qwen_tts_reference_text = "一応本を思ってるんだから\nペンパツシャクガンのシャナとして\n無駄口叩かない!\n私に教えるつもりがあるなら\nちゃんと勉強してから出直しなさい\n信じる戦いをする!\n幼児がお弁当食べてるの嫌だった\nどこにも騒がないから\nいつもの幼児に戻ったから\nそれは…\nそれが友柄だったら\nお前食われてるわね"
qwen_tts_language = "English"
qwen_tts_instruct = "Keep Shana's character identity and voice color, but speak English with neutral broadcast-style pronunciation. Preserve timbre and character through the reference voice, not through foreign accent. Use natural English stress, smooth connected phrasing, clear consonant endings, controlled volume, clear articulation, and relaxed non-nasal resonance. Avoid Japanese accent, katakana-like rhythm, vowel insertion between consonants, clipped final consonants, nasal or country twang, over-rounded vowels, sharp pitch lift, shouting, or harsh projection. Let any requested emotion still shape the performance without changing the core voice."
qwen_tts_timeout_seconds = 120
qwen_tts_extra_json = { temperature = 0.4, top_k = 8, top_p = 0.62, repetition_penalty = 1.0, speed = 0.82, output_peak = 0.64, speed_by_emotion = { neutral = 0.82, happy = 0.84, teasing = 0.83, concerned = 0.78, excited = 0.86, embarrassed = 0.78, annoyed = 0.8, default = 0.82 }, output_peak_by_emotion = { neutral = 0.64, happy = 0.6, teasing = 0.61, concerned = 0.58, excited = 0.62, embarrassed = 0.58, annoyed = 0.6, default = 0.64 }, max_new_tokens = 2048, min_new_tokens = 100 }

[profiles.qwen_shana_dataset_ref_soft]
label = "Qwen3-TTS Shana Dataset Ref Soft"
provider = "qwen-tts"
description = "Dataset-derived Shana reference using clean exact-agreement training-candidate clips; conservative English generation settings to reduce harshness and accent carryover."
qwen_tts_endpoint = "http://127.0.0.1:9882/tts"
qwen_tts_reference_audio = "./assets/voice_references/shana/shana_dataset_ref_22s.wav"
qwen_tts_reference_text = "お前たちのは違う\nそれって、これのこと?\nいつかここを出て行く時も 一緒に\nユージは強くなれるよ\nうん、美味しい\nどうすればいいか、気持ちが教えてくれる\nでももう心配ない\n私に教えるつもりがあるなら、ちゃんと勉強してから出直しなさい\nそれでもまだ残してやった方よ"
qwen_tts_language = "English"
qwen_tts_instruct = "Keep Shana's same core voice, age impression, distance, and restrained delivery across every emotion. Speak English with neutral natural pronunciation and smooth connected phrasing. Preserve timbre from the reference, not Japanese accent. Keep consonants clear but gentle, vowels relaxed, pitch changes small, and volume controlled. Avoid harsh projection, shouting, nasal twang, katakana-like rhythm, vowel insertion between consonants, clipped final consonants, or switching into a different speaker. Treat emotion as a subtle acting layer only."
qwen_tts_timeout_seconds = 120
qwen_tts_extra_json = { temperature = 0.36, top_k = 8, top_p = 0.58, repetition_penalty = 1.0, speed = 0.84, output_peak = 0.6, speed_by_emotion = { neutral = 0.84, happy = 0.85, teasing = 0.84, concerned = 0.8, excited = 0.86, embarrassed = 0.8, annoyed = 0.82, default = 0.84 }, output_peak_by_emotion = { neutral = 0.6, happy = 0.59, teasing = 0.59, concerned = 0.56, excited = 0.6, embarrassed = 0.56, annoyed = 0.58, default = 0.6 }, max_new_tokens = 2048, min_new_tokens = 100 }

