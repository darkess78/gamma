# Optional direct HTTPS listener for LAN/split-DNS access.
# Install this as /etc/nginx/conf.d/gamma-proxy.conf when this machine itself
# terminates TLS for gamma.neety.me instead of forwarding through external NPM.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gamma.neety.me;

    ssl_certificate /home/neety/.pki/certs/gamma.neety.me.crt;
    ssl_certificate_key /home/neety/.pki/private/gamma.neety.me.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    location = /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /dashboard {
        proxy_pass http://127.0.0.1:8001;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /login {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /logout {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /monitor {
        proxy_pass http://127.0.0.1:8001;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location /overlay/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /performer {
        proxy_pass http://127.0.0.1:8000;
    }

    location /performer/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
