# Local reverse proxy for an external Nginx Proxy Manager instance.
# NPM terminates HTTPS and forwards gamma.neety.me to this host on port 8080.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

map $http_x_forwarded_proto $gamma_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $http_x_forwarded_port $gamma_forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name gamma.neety.me;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $gamma_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $gamma_forwarded_port;

    location = /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /dashboard {
        proxy_pass http://127.0.0.1:8001;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /login {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /logout {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /monitor {
        proxy_pass http://127.0.0.1:8001;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location /overlay/ {
        proxy_pass http://127.0.0.1:8001;
    }

    location = /performer {
        proxy_pass http://127.0.0.1:8000;
    }

    location /performer/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
