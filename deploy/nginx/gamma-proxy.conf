# Gamma HTTPS Nginx Proxy Configuration
# For gamma.neety.me/dashboard

error_log /var/log/nginx/error.log warn;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    
    server_name gamma.neety.me;
    absolute_redirect off;
    
    # SSL Certificates
    ssl_certificate /home/neety/.pki/certs/gamma.neety.me.crt;
    ssl_certificate_key /home/neety/.pki/private/gamma.neety.me.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    
    # Timeouts for preventing 502 errors
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 86400s;
    proxy_set_header Connection "";
    
    # Proxy headers
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    
    # Health check to 8000
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
    
    # Main dashboard to 8000
    location / {
        proxy_pass http://127.0.0.1:8000/;
    }
    
    # Dashboard routes to 8001
    location = /dashboard {
        proxy_pass http://127.0.0.1:8001/dashboard;
    }
    
    location /dashboard/ {
        proxy_pass http://127.0.0.1:8001/dashboard/;
    }
    
    # Static assets from 8001
    location /static/ {
        proxy_pass http://127.0.0.1:8001/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location /images/ {
        proxy_pass http://127.0.0.1:8001/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Monitor pages
    location /monitor/ {
        proxy_pass http://127.0.0.1:8001/monitor/;
    }
    
    location /monitor {
        proxy_pass http://127.0.0.1:8001/monitor;
    }
    
    # Overlay pages
    location /overlay/ {
        proxy_pass http://127.0.0.1:8001/overlay/;
    }
    
    # Twitch routes
    location /twitch/ {
        proxy_pass http://127.0.0.1:8001/twitch/;
    }
    
    # Live voice
    location /live {
        proxy_pass http://127.0.0.1:8001/live;
    }
}
