<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shana Subtitle Overlay</title>
  <style>
    :root {
      --bg: transparent;
      --text: #ffffff;
      --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }
    .subtitle-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
      max-width: 1200px;
      padding: 0 24px;
    }
    .subtitle {
      font-size: clamp(24px, 5vw, 48px);
      line-height: 1.3;
      white-space: pre-wrap;
      word-wrap: break-word;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    body:hover .controls {
      opacity: 1;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: rgba(20, 25, 30, 0.9);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: rgba(30, 35, 40, 0.95); }
    .btn.danger { border-color: #da3633; color: #da3633; }
    .btn.danger:hover { background: rgba(218, 54, 51, 0.15); }
    .overlay-links {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      opacity: 0;
      transition: opacity 160ms ease;
    }
    body:hover .overlay-links {
      opacity: 1;
    }
    .overlay-links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(20, 25, 30, 0.8);
      border: 1px solid #30363d;
    }
    .overlay-links a:hover { background: rgba(88, 166, 255, 0.1); }
  </style>
</head>
<body>
  <div class="controls">
    <a data-dashboard-link href="/" class="btn">Dashboard</a>
    <a data-output-link="performer" href="/performer" class="btn">Performer Page</a>
    <span class="btn" id="overlayConnection">connecting</span>
    <span class="btn" id="overlayResume">seq 0</span>
    <button class="btn danger" onclick="stopShana()">Stop Shana</button>
  </div>

  <div class="subtitle-container">
    <div class="subtitle" id="subtitleDisplay">Waiting for subtitle...</div>
  </div>

  <div class="overlay-links">
    <a data-output-link="performer" href="/performer">Performer Page</a>
    <a data-dashboard-link href="/">Dashboard</a>
  </div>

  <script>
    let subscriberId = null;
    let ws = null;
    let currentTurnId = null;
    let lastSequence = 0;
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const replayRecent = params.get('replay_recent') || '20';
    const targetPolicy = params.get('target_policy') || 'stream_public';
    const clientName = params.get('client_name') || 'stream_pc_subtitle_overlay';
    const apiBase = browserReachableApiBase(params.get('api_base') || window.GAMMA_SHANA_BASE_URL || location.origin);
    const dashboardBase = browserReachableApiBase(params.get('dashboard_base') || window.GAMMA_DASHBOARD_BASE_URL || '');

    function browserReachableApiBase(rawBase) {
      const value = String(rawBase || '').replace(/\/$/, '');
      if (!value) {
        return '';
      }
      try {
        const apiUrl = new URL(value, location.origin);
        const browserHost = location.hostname;
        const apiIsLocal = ['127.0.0.1', 'localhost', '0.0.0.0', '::1'].includes(apiUrl.hostname);
        const browserIsLocal = ['127.0.0.1', 'localhost', '::1'].includes(browserHost);
        if (apiIsLocal && browserHost && !browserIsLocal) {
          apiUrl.hostname = browserHost;
        }
        return apiUrl.toString().replace(/\/$/, '');
      } catch (error) {
        return value;
      }
    }

    function updateOutputLinks() {
      const performerQuery = outputViewQuery('', {
        target_policy: 'stream_public',
        client_name: 'stream_pc_performer'
      });
      document.querySelectorAll('[data-output-link="performer"]').forEach(link => {
        link.href = `${apiBase ? `${apiBase}/performer` : '/performer'}${performerQuery}`;
      });
      document.querySelectorAll('[data-dashboard-link]').forEach(link => {
        link.href = dashboardBase ? `${dashboardBase}/` : '/';
      });
    }

    function outputViewQuery(apiBase, values) {
      const query = new URLSearchParams();
      if (apiBase) {
        query.set('api_base', apiBase);
      }
      Object.keys(values || {}).forEach(key => {
        if (values[key]) {
          query.set(key, values[key]);
        }
      });
      const text = query.toString();
      return text ? `?${text}` : '';
    }

    function connect() {
      const apiUrl = new URL(apiBase);
      const protocol = apiUrl.protocol === 'https:' ? 'wss:' : 'ws:';
      const query = new URLSearchParams({ replay_recent: replayRecent, target_policy: targetPolicy, client_name: clientName });
      document.getElementById('overlayResume').textContent = `seq ${lastSequence}`;
      if (lastSequence > 0) {
        query.set('after_sequence', String(lastSequence));
      }
      if (token) {
        query.set('token', token);
      }
      const url = `${protocol}//${apiUrl.host}/v1/performer/events?${query.toString()}`;
      
      ws = new WebSocket(url);
      
      ws.onopen = () => {
        document.getElementById('overlayConnection').textContent = 'connected';
        console.log('Overlay connected to performer events');
      };
      
      ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        updateOverlay(payload);
      };
      
      ws.onclose = () => {
        document.getElementById('overlayConnection').textContent = 'disconnected';
        console.log('Overlay disconnected, reconnecting...');
        setTimeout(connect, 2000);
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    function updateOverlay(payload) {
      // Only update subtitle for speech-related events
      if (payload.type === 'ready') {
        subscriberId = payload.subscriber_id || subscriberId;
        document.getElementById('overlayResume').textContent = payload.replay_gap ? `seq ${payload.after_sequence ?? lastSequence} gap` : `seq ${payload.after_sequence ?? lastSequence}`;
        if (targetMutedFromStats(payload.stats)) {
          document.getElementById('subtitleDisplay').textContent = '';
          currentTurnId = null;
        }
        return;
      }
      if (isStaleEvent(payload)) {
        return;
      }
      if (payload.sequence && payload.sequence > lastSequence) {
        lastSequence = payload.sequence;
        document.getElementById('overlayResume').textContent = `seq ${lastSequence}`;
      }
      if (payload.type === 'subtitle_update') {
        const text = payload.payload?.text || '';
        const clear = payload.payload?.clear || false;
        if (clear) {
          document.getElementById('subtitleDisplay').textContent = '';
        } else if (text) {
          // Clear and rebuild subtitle
          document.getElementById('subtitleDisplay').textContent = text;
        }
      } else if (payload.type === 'subtitle_clear') {
        document.getElementById('subtitleDisplay').textContent = '';
      } else if (payload.type === 'turn_started') {
        currentTurnId = payload.turn_id;
      } else if (payload.type === 'speech_started') {
        // Could add speaking indicator here
      } else if (payload.type === 'speech_ended') {
        // Turn completed
        currentTurnId = null;
      } else if (payload.type === 'output_cleared') {
        // All output cleared
        document.getElementById('subtitleDisplay').textContent = '';
        currentTurnId = null;
      } else if (payload.type === 'target_mute_changed') {
        if (payload.payload?.muted) {
          document.getElementById('subtitleDisplay').textContent = '';
          currentTurnId = null;
        }
      }
      
      // Update turn info in controls if needed
      if (payload.type === 'turn_state_changed') {
        const state = payload.payload?.state || 'unknown';
        console.log('Turn state:', state);
      }
    }

    function targetMutedFromStats(stats) {
      const mutedTargets = stats && Array.isArray(stats.muted_targets) ? stats.muted_targets : [];
      return mutedTargets.includes(targetPolicy);
    }

    function isStaleEvent(payload) {
      return !!(payload && payload.sequence && lastSequence > 0 && payload.sequence <= lastSequence);
    }

    function stopShana() {
      if (ws) {
        ws.close();
      }
      fetch(`${apiBase}/v1/stream/stop?reason=subtitle_overlay_stop`, { method: 'POST' })
        .then(() => {
          location.reload();
        })
        .catch(err => {
          console.error('Failed to stop Shana:', err);
          alert('Failed to stop Shana');
        });
    }

    updateOutputLinks();
    connect();
  </script>
</body>
</html>
